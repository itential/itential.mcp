---
# In this example, the Deployer will install and configure the Itential MCP server
# on a single VM using the SSE transport.
# All settings are explicitly defined.
# The MCP server will connect to an existing Itential Platform over HTTPS.
all:
  children:
    mcp:
      hosts:
        mcp01.example.com:
      vars:
        # The package version to install.
        # Set to 'latest' to always install the newest release from PyPI.
        mcp_version: <version>

        # The Python executable to use for the virtual environment.
        # Override if a specific Python version is installed at a non-default path.
        #  - example: /usr/bin/python3.11
        mcp_python_executable: /usr/bin/python3

        # The transport is set to SSE so AI clients can connect over the network.
        #  - valid values: sse, http
        mcp_transport: sse

        # The IP address and port the MCP server will listen on.
        mcp_host: "0.0.0.0"
        mcp_port: 8000

        # Log verbosity.
        #  - valid values: DEBUG, INFO, WARNING, ERROR, CRITICAL, NONE
        mcp_log_level: INFO

        # Response serialization format.
        #  - valid values: json, toon
        #  - toon reduces token usage by 30-60% for AI clients that support it
        mcp_response_format: json

        # Tool tag filters. Comma-separated list of tags to exclude from the server.
        # Individual tool names are always valid tags.
        mcp_exclude_tags: "experimental,beta"

        # Keepalive interval in seconds. Set to 0 to disable.
        mcp_keepalive_interval: 300

        # The Itential Platform host must be defined.
        mcp_platform_host: <itential-platform-hostname>

        # The platform API port.
        # Itential Platform defaults: 3000 (HTTP) or 3443 (HTTPS).
        mcp_platform_port: 3000

        # TLS settings for the platform connection.
        # Set mcp_platform_port: 3443 and mcp_platform_tls: true for HTTPS.
        mcp_platform_tls: true
        mcp_platform_disable_verify: false

        # Request timeout in seconds when calling the platform API.
        mcp_platform_timeout: 30

        # The platform credentials.
        # NOTE: Using Ansible Vault for these values is highly recommended.
        mcp_platform_user: <itential-platform-username>
        mcp_platform_password: <itential-platform-password>
