---
# Pre-installation checks. Run this before deploying the MCP server to verify
# that the target host meets requirements and that the platform is reachable.
- name: Verify Itential MCP server prerequisites
  hosts: mcp
  become: true
  tasks:
    - name: Include MCP verify tasks
      ansible.builtin.include_role:
        name: itential.mcp.mcp
        tasks_from: verify-mcp.yml
